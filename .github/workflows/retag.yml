name: Retag — Create OCI Image Indexes

# One-time workflow to create OCI image indexes for already-pushed per-arch tags.
# Use when per-arch manifests exist on ghcr.io but arch-agnostic index tags do not.
#
# Example invocation:
#   gh workflow run retag.yml \
#     -f app=goose \
#     -f versions="v1.25.3 v1.26.2 v1.27.1" \
#     -f latest_version=v1.27.1

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App name (e.g. goose)'
        required: true
      versions:
        description: 'Space-separated versions to create indexes for (e.g. "v1.25.3 v1.26.2 v1.27.1")'
        required: true
      latest_version:
        description: 'Version to point latest at (e.g. v1.27.1)'
        required: true

# Top-level: deny all. Job declares only what it needs.
permissions: {}

jobs:
  retag:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Login to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          # skopeo does not inherit podman's login session
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Create image indexes for each version
        run: |
          APP="${{ inputs.app }}"
          OWNER="${{ github.repository_owner }}"
          ARCH="x86_64"
          OCI_ARCH="amd64"

          for VERSION in ${{ inputs.versions }}; do
            ARCH_TAG="${VERSION}-${ARCH}"
            # skopeo inspect (without --raw) returns normalized JSON with .Digest at top level.
            # skopeo inspect --raw returns the raw manifest body which does NOT include digest.
            DIGEST=$(skopeo inspect "docker://ghcr.io/${OWNER}/${APP}:${ARCH_TAG}" \
              | jq -r '.Digest')
            [[ -n "${DIGEST}" && "${DIGEST}" != "null" ]] \
              || { echo "ERROR: could not get digest for ${ARCH_TAG}" >&2; exit 1; }

            echo "==> ${ARCH_TAG} digest: ${DIGEST}"
            podman manifest rm "localhost/${APP}:${VERSION}" 2>/dev/null || true
            podman manifest create "localhost/${APP}:${VERSION}"
            podman manifest add \
              --arch "${OCI_ARCH}" --os linux \
              "localhost/${APP}:${VERSION}" \
              "docker://ghcr.io/${OWNER}/${APP}@${DIGEST}"
            # Push index only — per-arch blobs already in registry, --all not needed
            podman manifest push \
              --format oci \
              "localhost/${APP}:${VERSION}" \
              "docker://ghcr.io/${OWNER}/${APP}:${VERSION}"
            echo "==> Created index ghcr.io/${OWNER}/${APP}:${VERSION} → ${ARCH} @ ${DIGEST}"
          done

      - name: Create latest index
        run: |
          APP="${{ inputs.app }}"
          OWNER="${{ github.repository_owner }}"
          ARCH="x86_64"
          OCI_ARCH="amd64"
          LATEST_ARCH_TAG="${{ inputs.latest_version }}-${ARCH}"

          LATEST_DIGEST=$(skopeo inspect "docker://ghcr.io/${OWNER}/${APP}:${LATEST_ARCH_TAG}" \
            | jq -r '.Digest')
          [[ -n "${LATEST_DIGEST}" && "${LATEST_DIGEST}" != "null" ]] \
            || { echo "ERROR: could not get digest for ${LATEST_ARCH_TAG}" >&2; exit 1; }

          echo "==> ${LATEST_ARCH_TAG} digest: ${LATEST_DIGEST}"
          podman manifest rm "localhost/${APP}:latest" 2>/dev/null || true
          podman manifest create "localhost/${APP}:latest"
          podman manifest add \
            --arch "${OCI_ARCH}" --os linux \
            "localhost/${APP}:latest" \
            "docker://ghcr.io/${OWNER}/${APP}@${LATEST_DIGEST}"
          # Push index only — per-arch blobs already in registry, --all not needed
          podman manifest push \
            --format oci \
            "localhost/${APP}:latest" \
            "docker://ghcr.io/${OWNER}/${APP}:latest"
          echo "==> Created index ghcr.io/${OWNER}/${APP}:latest → ${{ inputs.latest_version }} @ ${LATEST_DIGEST}"

      - name: Verify indexes
        run: |
          APP="${{ inputs.app }}"
          OWNER="${{ github.repository_owner }}"

          for TAG in ${{ inputs.versions }} latest; do
            RAW=$(skopeo inspect --raw "docker://ghcr.io/${OWNER}/${APP}:${TAG}")
            MEDIA_TYPE=$(echo "${RAW}" | jq -r '.mediaType')
            [[ "${MEDIA_TYPE}" == "application/vnd.oci.image.index.v1+json" ]] \
              || { echo "ERROR: ${TAG} expected OCI index, got ${MEDIA_TYPE}" >&2; exit 1; }
            COUNT=$(echo "${RAW}" | jq '.manifests | length')
            [[ "${COUNT}" -ge 1 ]] \
              || { echo "ERROR: ${TAG} index has no manifests" >&2; exit 1; }
            echo "==> ${TAG}: ${COUNT} platform(s) [${MEDIA_TYPE}]"
          done
